@if(disease() ; as disease ){
    <div class="group relative overflow-hidden rounded-xl bg-white dark:bg-[#1c1f27] border border-slate-200 dark:border-slate-800 shadow-sm transition-all hover:shadow-md">
        <div class="flex flex-col @container md:flex-row">
            <div
                class="w-full md:w-48 bg-center bg-no-repeat aspect-video md:aspect-square bg-cover"
                data-alt="Microscopic view of influenza virus"
                [style.background-image]="'url(' + (disease.image ? disease.image : fallbackImage) + ')'"

            ></div>
            <div class="flex-1 p-5 flex flex-col justify-between">
                <div>
                <p class="text-slate-900 dark:text-white text-lg font-bold mb-1">
                    {{ disease.name }}
                </p>
                <p class="text-slate-500 dark:text-[#9da6b9] text-sm mb-4">
                    {{disease.category}}
                </p>
                </div>
                <div class="space-y-3 ">
                    <div class="flex flex-col gap-2 hidden">
                        <div class="flex justify-between items-center text-xs text-slate-500 dark:text-[#9da6b9]">
                            <span>Fortschritt</span>
                            <span class="font-bold text-primary">80%</span>
                        </div>
                        <div class="h-1.5 w-full bg-slate-100 dark:bg-[#3b4354] rounded-full overflow-hidden">
                            <div class="h-full bg-primary rounded-full" style="width: 80%"></div>
                        </div>
                    </div>
                    <button class="w-full bg-primary hover:bg-blue-700 text-white text-sm font-semibold py-2 rounded-lg transition-colors" [routerLink]="['/disease', disease.disease_id]">
                        Weiterlernen
                    </button>
                </div>
            </div>
        </div>
</div>
}

<p>The new test for render</p>
