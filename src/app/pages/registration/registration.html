<div  class="relative flex min-h-screen w-full flex-col mesh-gradient bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-white min-h-screen overflow-x-hidden">
  <app-header></app-header>
  <div class="relative flex min-h-screen w-full flex-col mesh-gradient">
    <main class="flex-1 flex items-center justify-center px-4 py-12 md:py-20">
      <div  class="w-full max-w-[480px] bg-white dark:bg-[#161b26] border border-slate-200 dark:border-[#282e39] rounded-xl shadow-2xl p-8 md:p-10">
        <div class="text-center mb-8">
          <h1 class="text-slate-900 dark:text-white text-[32px] font-bold leading-tight mb-2">
            Konto erstellen
          </h1>
          <p class="text-slate-500 dark:text-slate-400 text-sm">
            Starten Sie Ihre medizinische Weiterbildung noch heute.
          </p>
        </div>

        <form class="space-y-5" [formGroup]="signupForm" (ngSubmit)="submit()">

          <div class="flex flex-col gap-2">
            <label class="text-slate-700 dark:text-white text-sm font-medium">Name</label>
            <input
              class="form-input w-full rounded-lg border border-slate-300 dark:border-[#3b4354] bg-white dark:bg-[#1c222d] text-slate-900 dark:text-white focus:border-primary focus:ring-1 focus:ring-primary h-12 px-4 placeholder:text-slate-400 dark:placeholder:text-[#9da6b9] text-base"
              placeholder="Ihr vollständiger Name"
              type="text"
              formControlName="name"
            />
            @if (name?.errors?.['required']) {
              <mat-error> Your Name is required </mat-error>
            }
          </div>

          <div class="flex flex-col gap-2">
            <label class="text-slate-700 dark:text-white text-sm font-medium">E-Mail</label>
            <input
              class="form-input w-full rounded-lg border border-slate-300 dark:border-[#3b4354] bg-white dark:bg-[#1c222d] text-slate-900 dark:text-white focus:border-primary focus:ring-1 focus:ring-primary h-12 px-4 placeholder:text-slate-400 dark:placeholder:text-[#9da6b9] text-base"
              placeholder="name@beispiel.de"
              type="email"
              formControlName="email"
            />
            @if (email?.errors?.['required']) {
              <mat-error> Your Email is required </mat-error>
            } @else if (email?.errors?.['email']) {
              <mat-error> Please Enter a Valid Email </mat-error>
            }
          </div>

          <div class="flex flex-col gap-2">
            <label class="text-slate-700 dark:text-white text-sm font-medium">Passwort</label>
            <div class="relative flex items-center">
              <input
                class="form-input w-full rounded-lg border border-slate-300 dark:border-[#3b4354] bg-white dark:bg-[#1c222d] text-slate-900 dark:text-white focus:border-primary focus:ring-1 focus:ring-primary h-12 px-4 pr-12 placeholder:text-slate-400 dark:placeholder:text-[#9da6b9] text-base"
                placeholder="Mindestens 8 Zeichen"
                [type]="type"
                formControlName="password"
              />
              <button
                class="absolute right-4 text-slate-400 dark:text-[#9da6b9] hover:text-slate-600 dark:hover:text-white transition-colors"
                type="button"
                (click)="clickEvent($event)"
                [attr.aria-label]="'Hide password'"
                [attr.aria-pressed]="hide()"
              >
                <mat-icon class="text-[22px]">{{
                  hide() ? 'visibility_off' : 'visibility'
                }}</mat-icon>
              </button>
            </div>
          </div>

          <div class="flex flex-col gap-2">
            <label class="text-slate-700 dark:text-white text-sm font-medium"
              >Passwort wiederholen</label
            >
            <div class="relative flex items-center">
              <input
                class="form-input w-full rounded-lg border border-slate-300 dark:border-[#3b4354] bg-white dark:bg-[#1c222d] text-slate-900 dark:text-white focus:border-primary focus:ring-1 focus:ring-primary h-12 px-4 pr-12 placeholder:text-slate-400 dark:placeholder:text-[#9da6b9] text-base"
                placeholder="Passwort bestätigen"
                [type]="type"
                formControlName="confirmPassword"
              />
              <button
                class="absolute right-4 text-slate-400 dark:text-[#9da6b9] hover:text-slate-600 dark:hover:text-white transition-colors"
                type="button"
                (click)="clickEvent($event)"
                [attr.aria-label]="'Hide password'"
                [attr.aria-pressed]="hide()"
              >
                <mat-icon class="text-[22px]">{{
                  hide() ? 'visibility_off' : 'visibility'
                }}</mat-icon>
              </button>
            </div>
          </div>

          <div class="pt-4">
            <button
              class="w-full h-14 bg-emerald-glow emerald-button-glow text-white font-bold text-lg rounded-lg hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-2"
              type="submit"
              [class.desabled]="signupForm.invalid"
              [disabled]="signupForm.invalid"
            >
              <span>Registrieren</span>
              <mat-icon class="">arrow_forward</mat-icon>
            </button>
          </div>

        </form>

        <div class="mt-8 text-center">
          <p class="text-slate-500 dark:text-slate-400 text-sm">
            Bereits ein Konto?
            <a
              class="text-primary dark:text-primary font-semibold hover:underline decoration-2 underline-offset-4 ml-1"
              routerLink="/login"
              >Einloggen</a
            >
          </p>
        </div>
        
      </div>
    </main>
  </div>
</div>
