<div class="relative flex min-h-screen w-full flex-col bg-background-light dark:bg-background-dark bg-medical-pattern ">
  <app-header></app-header>
  <main class="flex-1 flex items-center justify-center p-6 overflow-hidden mesh-gradient">
    <div
      class="layout-content-container flex flex-col w-full max-w-[480px] bg-white dark:bg-[#1c1f27] p-8 lg:p-10 rounded-xl shadow-2xl border border-gray-100 dark:border-[#3b4354]"
    >

      <div class="text-center mb-8">
        <h1
          class="text-gray-900 dark:text-white tracking-tight text-[32px] font-bold leading-tight mb-2"
        >
          Willkommen zurück
        </h1>
        <h2 class="text-gray-500 dark:text-gray-400 text-base font-medium leading-relaxed">
          Motiviert noch mehr zu lernen?
        </h2>
      </div>
      <form class="flex flex-col gap-6" [formGroup]="loginForm" (ngSubmit)="submit()" >

        <div class="flex flex-col gap-2">
          <label class="text-gray-700 dark:text-white text-sm font-semibold ml-1">Name</label>
          <div class="relative glow-blue rounded-lg transition-all">
            <input
              matInput
              class="form-input flex w-full rounded-lg text-gray-900 dark:text-white focus:outline-0 focus:ring-1 focus:ring-primary border border-gray-300 dark:border-[#3b4354] bg-white dark:bg-[#1c1f27] h-14 placeholder:text-gray-400 dark:placeholder:text-[#9da6b9] px-4 text-base font-normal"
              placeholder="Benutzername eingeben"
              type="text"
              formControlName="username"
            />
          </div>
        </div>

        <div class="flex flex-col gap-2">
          <div class="flex justify-between items-center ml-1 ">
            <label class="text-gray-700 dark:text-white text-sm font-semibold">Passwort</label>
            <a class="text-primary text-xs font-semibold hover:underline hidden" href="#"
              >Passwort vergessen?</a
            >
          </div>
          <div
            class="relative flex items-stretch rounded-lg glow-blue transition-all border border-gray-300 dark:border-[#3b4354] bg-white dark:bg-[#1c1f27]"
          >
            <input
              matInput
              class="form-input flex-1 border-none bg-transparent h-14 text-gray-900 dark:text-white focus:outline-0 focus:ring-1 focus:ring-primary placeholder:text-gray-400 dark:placeholder:text-[#9da6b9] px-4 text-base font-normal rounded-l-lg"
              placeholder="Password eingeben"
              [type]="type"
              formControlName="password"
            />
            <button
              class="text-gray-400 dark:text-[#9da6b9] flex items-center justify-center px-4 hover:text-primary transition-colors"
              type="button"
              (click)="clickEvent($event)"
              [attr.aria-label]="'Hide password'"
              [attr.aria-pressed]="hide()"
            >
              <mat-icon>{{hide() ? 'visibility_off' : 'visibility'}}</mat-icon>
            </button>
            
          </div>
        </div>

        <div class="pt-4">
            <button
              class="w-full h-14 bg-emerald-glow emerald-button-glow text-white font-bold text-lg rounded-lg hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-2"
              type="submit"
              [class.desabled]="loginForm.invalid"
              [disabled]="loginForm.invalid"
            >
              <span>Einloggen</span>
              <mat-icon class="">login</mat-icon>
            </button>
          </div>
      </form>

      <div class="mt-8 text-center">
        <p class="text-gray-500 dark:text-gray-400 text-sm">
          Noch kein Konto?
          <a class="text-primary font-bold hover:underline ml-1" routerLink="/registration">Registrieren</a>
        </p>
      </div>
    </div>
  </main>
  <div class="fixed bottom-0 right-0 w-96 h-96 opacity-10 pointer-events-none overflow-hidden">
    <svg
      class="w-full h-full text-primary fill-current"
      viewbox="0 0 200 200"
      xmlns="http://www.w3.org/2000/svg"
    >
      <path
        d="M44.7,-76.4C58.8,-69.2,71.8,-59.1,79.6,-45.8C87.4,-32.5,90.1,-16.3,88.5,-0.9C86.9,14.4,81,28.8,72.4,41.2C63.8,53.7,52.5,64.2,39.4,71.2C26.3,78.2,13.1,81.7,-0.7,82.9C-14.5,84.1,-29,82.9,-42.4,76.5C-55.8,70.1,-68.1,58.4,-76.3,44.7C-84.5,31,-88.6,15.5,-87.7,0.5C-86.8,-14.5,-80.9,-29,-71.7,-41C-62.5,-53.1,-50,-62.7,-36.4,-70.3C-22.8,-77.9,-11.4,-83.4,2.3,-87.4C16,-91.4,30.6,-83.6,44.7,-76.4Z"
        transform="translate(100 100)"
      ></path>
    </svg>
  </div>
</div>
